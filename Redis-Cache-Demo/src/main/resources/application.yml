spring:
  application:
    name: redis-cache-demo
  data:
    redis:
      host: localhost
      port: 6379
      password:             # set if your Redis requires auth
      database: 0
      timeout: 3s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2s

server:
  port: 8080

app:
  cache:
    rebuild-threads: 4
