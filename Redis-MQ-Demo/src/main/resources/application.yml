spring:
  application:
    name: redis-mq-demo
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 2s
      timeout: 3s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 2s

server:
  port: 8080

logging:
  level:
    com.example.redismqdemo: INFO
